# ──────────────────────────────────────────────────────────────────────────────
# DoseLoop — Google Cloud Build Pipeline
#
# This file is used by Google Cloud Build to:
#   1. Build both Docker images (server + client)
#   2. Push them to Google Artifact Registry
#   3. Deploy both to Google Cloud Run
#
# Prerequisites:
#   - A GCP project with billing enabled
#   - Artifact Registry repo created (see deploy/README-GCP.md)
#   - Cloud Run, Cloud Build, and Artifact Registry APIs enabled
#   - Cloud Build service account with roles:
#       - roles/run.admin
#       - roles/iam.serviceAccountUser
#       - roles/artifactregistry.writer
#
# Trigger this pipeline:
#   gcloud builds submit --config deploy/cloudbuild.yaml \
#     --substitutions _PROJECT_ID=your-project-id,_REGION=us-central1,_SERVER_URL=https://doseloop-server-xxxx-uc.a.run.app
#
# Or set up a Cloud Build trigger in the GCP Console to auto-run on git push.
# ──────────────────────────────────────────────────────────────────────────────

substitutions:
  # ── Required — override these when triggering or in the Cloud Build trigger UI ──
  _PROJECT_ID: "your-gcp-project-id"          # e.g. doseloop-prod
  _REGION: "us-central1"                       # Cloud Run region
  _ARTIFACT_REPO: "doseloop"                   # Artifact Registry repo name

  # ── Derived image paths ──
  _SERVER_IMAGE: "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_ARTIFACT_REPO}/doseloop-server"
  _CLIENT_IMAGE: "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_ARTIFACT_REPO}/doseloop-client"

  # ── Vite build-time vars (client only) ──
  # After first deploy, set _SERVER_URL to the Cloud Run URL of the server service.
  _SERVER_CLOUD_RUN_URL: "https://doseloop-server-REPLACE-ME.a.run.app"
  _VITE_SUPABASE_URL: "https://hvduagntoflynubyaqxs.supabase.co"
  _VITE_SUPABASE_ANON_KEY: ""   # Set this in the Cloud Build trigger UI (secret)

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"

steps:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Build — Server image
  # ────────────────────────────────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-server"
    args:
      - build
      - "--tag=${_SERVER_IMAGE}:$SHORT_SHA"
      - "--tag=${_SERVER_IMAGE}:latest"
      - "--cache-from=${_SERVER_IMAGE}:latest"
      - "--file=server/Dockerfile"
      - "server"
    waitFor: ["-"]   # Start immediately

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Build — Client image (needs VITE_ build args)
  # ────────────────────────────────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-client"
    args:
      - build
      - "--tag=${_CLIENT_IMAGE}:$SHORT_SHA"
      - "--tag=${_CLIENT_IMAGE}:latest"
      - "--cache-from=${_CLIENT_IMAGE}:latest"
      - "--file=client/Dockerfile"
      - "--build-arg=VITE_API_URL=${_SERVER_CLOUD_RUN_URL}/api/v1"
      - "--build-arg=VITE_SUPABASE_URL=${_VITE_SUPABASE_URL}"
      - "--build-arg=VITE_SUPABASE_ANON_KEY=${_VITE_SUPABASE_ANON_KEY}"
      - "client"
    waitFor: ["-"]   # Runs in parallel with build-server

  # ────────────────────────────────────────────────────────────────────────────
  # 3. Push — Server image to Artifact Registry
  # ────────────────────────────────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-server"
    args:
      - push
      - "--all-tags"
      - "${_SERVER_IMAGE}"
    waitFor: ["build-server"]

  # ────────────────────────────────────────────────────────────────────────────
  # 4. Push — Client image to Artifact Registry
  # ────────────────────────────────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-client"
    args:
      - push
      - "--all-tags"
      - "${_CLIENT_IMAGE}"
    waitFor: ["build-client"]

  # ────────────────────────────────────────────────────────────────────────────
  # 5. Deploy — Server to Cloud Run
  # ────────────────────────────────────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-server"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "doseloop-server"
      - "--image=${_SERVER_IMAGE}:$SHORT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=5000"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--set-env-vars=NODE_ENV=production,PORT=5000"
      # Secrets from Secret Manager — format: ENV_VAR=secret-name:version
      # Uncomment and set after creating secrets in Secret Manager:
      # - "--set-secrets=DATABASE_URL=doseloop-database-url:latest,SUPABASE_SERVICE_ROLE_KEY=doseloop-supabase-service-role-key:latest,JWT_SECRET=doseloop-jwt-secret:latest,GROQ_API_KEY=doseloop-groq-api-key:latest,RESEND_API_KEY=doseloop-resend-api-key:latest"
      - "--project=${_PROJECT_ID}"
    waitFor: ["push-server"]

  # ────────────────────────────────────────────────────────────────────────────
  # 6. Deploy — Client to Cloud Run
  # ────────────────────────────────────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-client"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "doseloop-client"
      - "--image=${_CLIENT_IMAGE}:$SHORT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=80"
      - "--memory=256Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--project=${_PROJECT_ID}"
    waitFor: ["push-client"]

images:
  - "${_SERVER_IMAGE}:$SHORT_SHA"
  - "${_SERVER_IMAGE}:latest"
  - "${_CLIENT_IMAGE}:$SHORT_SHA"
  - "${_CLIENT_IMAGE}:latest"
