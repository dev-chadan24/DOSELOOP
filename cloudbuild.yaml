# ──────────────────────────────────────────────────────────────────────────────
# DoseLoop — Google Cloud Build Pipeline
# Place: ROOT of the repository (so Cloud Build triggers find it automatically)
#
# Build flow:
#   1. Build server image  (from server/Dockerfile)
#   2. Build client image  (from client/Dockerfile)  — runs in parallel
#   3. Push both to Artifact Registry
#   4. Deploy both to Cloud Run
#
# Cloud Build trigger config:
#   - Build configuration: Cloud Build configuration file (YAML or JSON)
#   - Location: Repository  →  / (root)  →  cloudbuild.yaml
#
# Required substitution variables (set in Cloud Build trigger UI):
#   _PROJECT_ID          — your GCP project ID
#   _REGION              — e.g. us-central1
#   _SERVER_CLOUD_RUN_URL — Cloud Run URL of doseloop-server (after first deploy)
#   _VITE_SUPABASE_ANON_KEY — Supabase anon key (mark as secret in trigger UI)
# ──────────────────────────────────────────────────────────────────────────────

substitutions:
  _PROJECT_ID: "doseloop-prod"
  _REGION: "us-central1"
  _ARTIFACT_REPO: "doseloop"

  # Image paths in Artifact Registry
  _SERVER_IMAGE: "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_ARTIFACT_REPO}/doseloop-server"
  _CLIENT_IMAGE: "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_ARTIFACT_REPO}/doseloop-client"

  # Runtime URL of the server Cloud Run service (used by Vite at build time)
  # On first deploy: use placeholder below. After server is live, update to the
  # real Cloud Run URL and re-trigger the build.
  _SERVER_CLOUD_RUN_URL: "https://placeholder.run.app"

  # Supabase public values (safe to commit)
  _VITE_SUPABASE_URL: "https://hvduagntoflynubyaqxs.supabase.co"
  # ⚠️  Set VITE_SUPABASE_ANON_KEY in the Cloud Build trigger UI substitutions
  _VITE_SUPABASE_ANON_KEY: ""

options:
  logging: LEGACY
  machineType: "E2_HIGHCPU_8"

steps:
  # ── Step 1: Build server image ──────────────────────────────────────────────
  # Context = server/   |   Dockerfile = server/Dockerfile
  - name: "gcr.io/cloud-builders/docker"
    id: "build-server"
    args:
      - build
      - "--tag=${_SERVER_IMAGE}:$SHORT_SHA"
      - "--tag=${_SERVER_IMAGE}:latest"
      - "--cache-from=${_SERVER_IMAGE}:latest"
      - "--file=server/Dockerfile"
      - "server"
    waitFor: ["-"]

  # ── Step 2: Build client image (parallel) ───────────────────────────────────
  # Context = client/   |   Dockerfile = client/Dockerfile
  # VITE_* vars are baked in at build time by Vite
  - name: "gcr.io/cloud-builders/docker"
    id: "build-client"
    args:
      - build
      - "--tag=${_CLIENT_IMAGE}:$SHORT_SHA"
      - "--tag=${_CLIENT_IMAGE}:latest"
      - "--cache-from=${_CLIENT_IMAGE}:latest"
      - "--file=client/Dockerfile"
      - "--build-arg=VITE_API_URL=${_SERVER_CLOUD_RUN_URL}/api/v1"
      - "--build-arg=VITE_SUPABASE_URL=${_VITE_SUPABASE_URL}"
      - "--build-arg=VITE_SUPABASE_ANON_KEY=${_VITE_SUPABASE_ANON_KEY}"
      - "client"
    waitFor: ["-"]

  # ── Step 3: Push server image ────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-server"
    args: ["push", "--all-tags", "${_SERVER_IMAGE}"]
    waitFor: ["build-server"]

  # ── Step 4: Push client image ────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-client"
    args: ["push", "--all-tags", "${_CLIENT_IMAGE}"]
    waitFor: ["build-client"]

  # ── Step 5: Deploy server to Cloud Run ──────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-server"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "doseloop-server"
      - "--image=${_SERVER_IMAGE}:$SHORT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=5000"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--set-env-vars=NODE_ENV=production,PORT=5000,SUPABASE_URL=https://hvduagntoflynubyaqxs.supabase.co,SUPABASE_SERVICE_ROLE_KEY=${_SUPABASE_SERVICE_ROLE_KEY},JWT_SECRET=${_JWT_SECRET},GROQ_API_KEY=${_GROQ_API_KEY},RESEND_API_KEY=${_RESEND_API_KEY},DATABASE_URL=${_DATABASE_URL},RESEND_FROM_EMAIL=emergency@doseloop.com"
      - "--project=${_PROJECT_ID}"
    waitFor: ["push-server"]

  # ── Step 6: Deploy client to Cloud Run ──────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-client"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "doseloop-client"
      - "--image=${_CLIENT_IMAGE}:$SHORT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=80"
      - "--memory=256Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--project=${_PROJECT_ID}"
    waitFor: ["push-client"]

images:
  - "${_SERVER_IMAGE}:$SHORT_SHA"
  - "${_SERVER_IMAGE}:latest"
  - "${_CLIENT_IMAGE}:$SHORT_SHA"
  - "${_CLIENT_IMAGE}:latest"
