<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DoseLoop — Calm family health, together</title>
    <meta
      name="description"
      content="DoseLoop is an AI-powered family health companion for medications, wellness, and peace of mind."
    />
    <meta name="author" content="DoseLoop" />

    <!-- Open Graph -->
    <meta property="og:title" content="DoseLoop — Calm family health, together" />
    <meta
      property="og:description"
      content="An AI-powered family health companion for medications, wellness, and peace of mind."
    />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@DoseLoop" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
    />

    <!-- Theme init script: runs before React hydrates to prevent flash of wrong theme -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('doseloop-theme') || 'system';
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (theme === 'dark' || (theme === 'system' && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
