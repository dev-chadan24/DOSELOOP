# ──────────────────────────────────────────────────────────────────────────────
# DoseLoop — Google Cloud Build Pipeline (Production)
# Location: ROOT of the repository
#
# Build flow:
#   1. Build server image  (from server/Dockerfile) — parallel
#   2. Build client image  (from client/Dockerfile) — parallel
#   3. Run prisma migrate deploy (pre-deploy migration step)
#   4. Push both images to Artifact Registry
#   5. Deploy both to Cloud Run
#
# Prerequisites (one-time setup — see deploy/README-GCP.md):
#   - GCP project with billing enabled
#   - Artifact Registry repo: gcloud artifacts repositories create doseloop \
#       --repository-format=docker --location=us-central1
#   - Secrets created in Secret Manager (see deploy/README-GCP.md § Step 3)
#   - Cloud Build SA with roles: run.admin, artifactregistry.writer,
#     iam.serviceAccountUser, secretmanager.secretAccessor
#
# Required substitutions (set in Cloud Build trigger UI — mark secrets as 🔒):
#   _PROJECT_ID            — GCP project ID (e.g. doseloop-prod)
#   _REGION                — Cloud Run region (e.g. us-central1)
#   _SERVER_CLOUD_RUN_URL  — Cloud Run URL of doseloop-server (set after 1st deploy)
#   _VITE_SUPABASE_ANON_KEY — Supabase anon key (🔒 mark as secret in trigger UI)
# ──────────────────────────────────────────────────────────────────────────────

substitutions:
  _PROJECT_ID: "doseloop-prod-501816"
  _REGION: "us-central1"
  _ARTIFACT_REPO: "doseloop"

  # Derived image paths in Artifact Registry
  _SERVER_IMAGE: "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_ARTIFACT_REPO}/doseloop-server"
  _CLIENT_IMAGE: "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_ARTIFACT_REPO}/doseloop-client"

  # Cloud Run URL of the server service — used by Vite as VITE_API_URL at build time.
  # On first deploy: leave as placeholder, then update after server is live.
  _SERVER_CLOUD_RUN_URL: "https://doseloop-server-REPLACE-ME.a.run.app"

  # Supabase public URL (not a secret — safe to commit)
  _VITE_SUPABASE_URL: "https://hvduagntoflynubyaqxs.supabase.co"

  # ⚠️  Set VITE_SUPABASE_ANON_KEY in the Cloud Build trigger UI substitutions
  # (mark it as a secret variable — it will not appear in build logs)
  _VITE_SUPABASE_ANON_KEY: ""

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"

steps:
  # ── Step 1: Build server image ──────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-server"
    args:
      - build
      - "--tag=${_SERVER_IMAGE}:$SHORT_SHA"
      - "--tag=${_SERVER_IMAGE}:latest"
      - "--cache-from=${_SERVER_IMAGE}:latest"
      - "--file=server/Dockerfile"
      - "server"
    waitFor: ["-"]  # Start immediately (parallel with build-client)

  # ── Step 2: Build client image ───────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-client"
    args:
      - build
      - "--tag=${_CLIENT_IMAGE}:$SHORT_SHA"
      - "--tag=${_CLIENT_IMAGE}:latest"
      - "--cache-from=${_CLIENT_IMAGE}:latest"
      - "--file=client/Dockerfile"
      - "--build-arg=VITE_API_URL=${_SERVER_CLOUD_RUN_URL}/api/v1"
      - "--build-arg=VITE_SUPABASE_URL=${_VITE_SUPABASE_URL}"
      - "--build-arg=VITE_SUPABASE_ANON_KEY=${_VITE_SUPABASE_ANON_KEY}"
      - "client"
    waitFor: ["-"]  # Start immediately (parallel with build-server)

  # ── Step 3: Push server image ────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-server"
    args: ["push", "--all-tags", "${_SERVER_IMAGE}"]
    waitFor: ["build-server"]

  # ── Step 4: Push client image ────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-client"
    args: ["push", "--all-tags", "${_CLIENT_IMAGE}"]
    waitFor: ["build-client"]

  # ── Step 5: Run Prisma migrations (pre-deploy, against production DB) ────────
  # This uses the DIRECT_URL (non-pooled) for migrations as required by Prisma.
  # The DATABASE_URL and DIRECT_URL secrets are mounted from Secret Manager.
  # If migration fails, the deploy steps below will NOT run (waitFor dependency).
  - name: "node:22-alpine"
    id: "prisma-migrate"
    entrypoint: "sh"
    args:
      - "-c"
      - |
        apk add --no-cache openssl &&
        cd server &&
        npm ci --ignore-scripts &&
        npx prisma generate &&
        npx prisma migrate deploy
    secretEnv: ["DATABASE_URL", "DIRECT_URL"]
    waitFor: ["push-server"]  # Wait for server push so we know the image is valid

  # ── Step 6: Deploy server to Cloud Run ──────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-server"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "doseloop-server"
      - "--image=${_SERVER_IMAGE}:$SHORT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=5000"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--concurrency=80"
      - "--timeout=300"
      # Non-secret env vars injected as plain env config
      - "--set-env-vars=NODE_ENV=production,PORT=5000,RESEND_FROM_EMAIL=emergency@doseloop.com"
      # 🔒 Secrets mounted from Google Secret Manager
      # Format: ENV_VAR_NAME=secret-name:version
      - "--set-secrets=DATABASE_URL=doseloop-database-url:latest,DIRECT_URL=doseloop-direct-url:latest,SUPABASE_URL=doseloop-supabase-url:latest,SUPABASE_SERVICE_ROLE_KEY=doseloop-supabase-service-role-key:latest,JWT_SECRET=doseloop-jwt-secret:latest,GROQ_API_KEY=doseloop-groq-api-key:latest,RESEND_API_KEY=doseloop-resend-api-key:latest,CORS_ORIGIN=doseloop-cors-origin:latest,CRON_SECRET=doseloop-cron-secret:latest"
      - "--project=${_PROJECT_ID}"
    waitFor: ["prisma-migrate"]

  # ── Step 7: Deploy client to Cloud Run ──────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-client"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "doseloop-client"
      - "--image=${_CLIENT_IMAGE}:$SHORT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=80"
      - "--memory=256Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--concurrency=1000"
      - "--timeout=60"
      - "--project=${_PROJECT_ID}"
    waitFor: ["push-client"]  # Client deploy is independent of server deploy

availableSecrets:
  secretManager:
    # Secrets accessed during the prisma-migrate step
    - versionName: "projects/${_PROJECT_ID}/secrets/doseloop-database-url/versions/latest"
      env: "DATABASE_URL"
    - versionName: "projects/${_PROJECT_ID}/secrets/doseloop-direct-url/versions/latest"
      env: "DIRECT_URL"

images:
  - "${_SERVER_IMAGE}:$SHORT_SHA"
  - "${_SERVER_IMAGE}:latest"
  - "${_CLIENT_IMAGE}:$SHORT_SHA"
  - "${_CLIENT_IMAGE}:latest"
